<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/cadastro.css') }}">
  <title>SNEPS - Entrar</title>

  <!-- Google API -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <script>

    function handleCredentialResponse(response) {
      fetch("/Login/callback", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ credential: response.credential })
      })
      .then(res => res.json())
      .then(data => {
        if (data.status === "ok") {
          window.location.href = "/Inicio";
        } else {
          alert("Erro no login Google.");
        }
      });
    }

    window.onload = function () {
      google.accounts.id.initialize({
        client_id: "334998652961-c43b5pt422pnfqk98t56pu4d6aphi5fe.apps.googleusercontent.com",
        callback: handleCredentialResponse
      });

      google.accounts.id.renderButton(
        document.getElementById("googleSignInBtn"),
        { theme: "outline", size: "large" }
      );
    };
  </script>
</head>
<body>
  <div class="container">
    <form action="{{ url_for('rotas.cadastro') }}" method="POST">
      <h1>Entrar</h1>

      <br><br>
      <div id="googleSignInBtn"></div>
    </form>
  </div>
</body>
</html>
