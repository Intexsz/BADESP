<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina da secretaria</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/secretaria.css') }}">
    <script src="{{ url_for('static', filename='js/inicio.js') }}" defer></script>
 </head>
 <header class="Cabecalho">
    
    <h1 class="nome">S.N.E.P</h1>
    
    <button class="menu-btn">☰</button>

    <nav class="sidebar">
      <ul>
        <li><a href="/Inicio">Início</a></li>
        <li><a href="/Ajuda">Ajuda</a></li>
        <li><a href="/Denuncia">Fazer Denúncia</a></li>
        <li><a href="/Logout" onclick="return confirmarLogout()">Deslogar</a></li>
      </ul>
    </nav>

    <div class="profile-icon">
      <img src="{{ usuario[3] }}" alt="Foto do usuário" style="border-radius:50%">    
    </div>

  </header>
 <body>
      <div class="grid-container">
        {% if denuncias %}
          {% for d in denuncias[:4] %}
          <form action="{{ url_for('rotasecretaria.detalhe_denuncia', id=d[0]) }}" method="GET" onclick="return confirmarAbrir()">
            <div class="grid-item"><button type="submit">{{ d[1] }}</button></div>
          </form>
          {% endfor %}
        {% endif %}
    </div>

    <a href="#" class="next-page-arrow" aria-label="Próxima página"></a>

    <script>
      // Toggle menu lateral
      const btn = document.querySelector('.menu-btn');
      const sidebar = document.querySelector('.sidebar');
      btn.addEventListener('click', () => {
        sidebar.classList.toggle('active');
      });
  
      function confirmarLogout() {
        return confirm("Você tem certeza que quer deslogar?");
      }
  
      function confirmarAbrir() {
        return confirm("Você tem certeza que deseja abrir? Após aberto não poderá mais ser deletado e o usuario SABERÁ que foi você quem abriu");
      }
    </script>
 </body>
</html>
