<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina de denuncia da secretaria</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Libertinus+Serif+Display&family=Monoton&display=swap" rel="stylesheet">
   <link rel="stylesheet" href="{{ url_for('static', filename='secretaria.css') }}">
  </head>
 <header class="Cabecalho">
    
    <h1 class="nome">S.N.E.P</h1>
    
    <button class="menu-btn">☰</button>

    <nav class="sidebar">
      <ul>
       <li><a href="/Inicio">Início</a></li>
       <li><a href="/Ajuda">Ajuda</a></li>
       <li><a href="/Denuncia">Ver Denuúncia</a></li>
      </ul>
    </nav>

    <div class="profile-icon">
      <img src="{{ usuario[3] }}" alt="Foto do usuário" style="border-radius:50%">
         <div id="profile-menu" class="profile-menu">
           <ul>
             <li><a href="#">Configurações</a></li>
             <li><a href="/Logout" onclick="return confirmarLogout()"><i class="fas fa-user-circle"></i>Deslogar</a></li>
           </ul>
        </div>
    </div>

  </header>

 <body>
   <h6 class="mensagem">Bem Vindo Secretário</h6>
      <form  class="filtro" method="GET" action="{{ url_for('rotas.inicio') }}">
        <select name="filtro" onchange="this.form.submit()">
          <option value="Tudo" {% if filtro == "Tudo" %}selected{% endif %}>Tudo</option>
          <option value="Aprovado" {% if filtro == "Aprovado" %}selected{% endif %}>Aprovado</option>
          <option value="Recusado" {% if filtro == "Recusado" %}selected{% endif %}>Recusado</option>
          <option value="Arquivado" {% if filtro == "Arquivado" %}selected{% endif %}>Arquivado</option>
          <option value="Aberto" {% if filtro == "Aberto" %}selected{% endif %}>Aberto</option>
        </select>
      </form>

      <div class="grid-container">
        <div class="grid-item"><button>Denuncia 1</button></div>
        <div class="grid-item"><button>Denuncia 2</button></div>
        <div class="grid-item"><button>Denuncia 3</button></div>
        <div class="grid-item"><button>Denuncia 4</button></div>
    </div>
    <script>
      //menu//
      const btn = document.querySelector('.menu-btn');
      const sidebar = document.querySelector('.sidebar');
      btn.addEventListener('click', () => {
      sidebar.classList.toggle('active');
      if (btn.textContent === "☰") {
      btn.textContent = "✖";
      } else {
      btn.textContent = "☰";
       }
      });
      document.addEventListener('click', function(event) {
      const sidebar = document.querySelector('.sidebar');
      const menuBtn = document.querySelector('.menu-btn');
      const isClickInsideSidebar = sidebar.contains(event.target);
      const isClickOnMenuBtn = menuBtn.contains(event.target);
  
      if (sidebar.classList.contains('active') && !isClickInsideSidebar && !isClickOnMenuBtn) {
      sidebar.classList.remove('active');
       }
      });

     //perfil//

     function toggleProfileMenu() {
     var menu = document.getElementById("profile-menu");
     menu.classList.toggle("show"); 
     }

     window.onclick = function(event) {
     var profileMenu = document.getElementById("profile-menu");
     if (!event.target.closest('.profile-icon')) {
        if (profileMenu.classList.contains("show")) {
            profileMenu.classList.remove("show");
            }
        }
      }


    </script>
 </body>
</html>
