<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='cadastro.css') }}">
    <title>B.A.D.E.S.P - Cadastro</title>
</head>

<body>
    <div class="container">
        <h1>Cadastro</h1>

        <form method="POST" action="{{ url_for('rotas.cadastro2_pin') }}" onsubmit="return validarPin()" autocomplete="off">
            
            <div class="input-container has-select">
                <select name="escola" id="select-escola" required>
                    <option value="" disabled selected>Selecione a escola</option>
                    <option value="PEI Francisco Pereira De Souza Filho Prof">PEI Francisco Pereira De Souza Filho Prof</option>
                </select>
            </div>

            {% if cargo == 'Aluno' %}
            <div class="input-container has-select">
                <select name="ano" id="select-serie" required onchange="filtrarTurmas()">
                    <option value="" disabled selected>Selecione a série</option>
                    {% set anos_exibidos = [] %}
                    {% for turma in turmas %}
                        {% set ano_loop = turma.split('°')[0] %}
                        {% if ano_loop not in anos_exibidos %}
                            <option value="{{ ano_loop }}">{{ ano_loop }}° Ano</option>
                            {% set _ = anos_exibidos.append(ano_loop) %}
                        {% endif %}
                    {% endfor %}
                </select>
            </div>

            <div class="input-container has-select" id="container-turma" style="display: none;">
                <select name="turma" id="select-turma" required>
                    <option value="" disabled selected>Selecione a turma</option>
                    {% for turma in turmas %}
                        {% set ano_t = turma.split('°')[0] %}
                        {% set serie_t = turma.split('°')[1] %}
                        <option value="{{ serie_t }}" data-ano="{{ ano_t }}">{{ serie_t }}</option>
                    {% endfor %}
                </select>
            </div>
            {% endif %}

            <div class="input-container">
                <input placeholder="PIN" type="text" name="pin" id="pin" inputmode="numeric" required maxlength="6" minlength="6" oninput="this.value = this.value.replace(/\D/g, '')">
            </div>
            <div class="input-container">
                <input placeholder="Confirmar PIN" type="text" name="confirmar" inputmode="numeric" id="confirmar" required maxlength="6" minlength="6" oninput="this.value = this.value.replace(/\D/g, '')">
            </div>

            <div class='Termos'>
                <input type="checkbox" required>
                <p>Ao criar uma conta você concorda com os <a href="/Termos" style="color: Blue;">Termos de Condições</a></p>
            </div>
            <button type="submit" class="submit-button">Confirmar</button>
        </form>
    </div>

    <script>
        function filtrarTurmas() {
            const anoSelecionado = document.getElementById("select-serie").value;
            const containerTurma = document.getElementById("container-turma");
            const selectTurma = document.getElementById("select-turma");
            const optionsTurma = selectTurma.querySelectorAll("option");

            // 1. Mostra o container da turma se um ano for escolhido
            containerTurma.style.display = 'block';

            // 2. Reseta o select de turma para a opção padrão
            selectTurma.value = "";

            // 3. Filtra os options baseado no data-ano
            let contagemValidos = 0;
            optionsTurma.forEach(opt => {
                if (opt.value === "") {
                    opt.style.display = "block"; // Deixa o "Selecione a turma" visível
                } else if (opt.getAttribute("data-ano") === anoSelecionado) {
                    opt.style.display = "block";
                    contagemValidos++;
                } else {
                    opt.style.display = "none";
                }
            });
        }

        function validarPin() {
            const pin = document.getElementById("pin").value;
            const confirmar = document.getElementById("confirmar").value;
            if (pin === '000000' || pin === '0') {
                alert("O PIN não pode ser 000000!");
                return false;
            }
            if (pin !== confirmar) {
                alert("Os PINs não coincidem!");
                return false;
            }
            return true;
        }
    </script>

      <div vw class="enabled">
    <div vw-access-button class="active"></div>
    <div vw-plugin-wrapper>
      <div class="vw-plugin-top-wrapper"></div>
    </div>
  </div>
  <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
  <script>
    new window.VLibras.Widget('https://vlibras.gov.br/app');
  </script>
  
</body>
</html>
