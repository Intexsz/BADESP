<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Acesso encerrado</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #111827, #020617);
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            max-width: 600px;
            width: 100%;
            background: rgba(255,255,255,0.08);
            border-radius: 18px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }

        h1 {
            color: #facc15;
        }

        p {
            color: #ddd;
            line-height: 1.5;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            background: #2563eb;
            color: white;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Acesso encerrado</h1>

        <p>
            Este sistema é exclusivo para alunos que ainda estão cursando na escola.
        </p>

        <p>
            Mesmo que seu e-mail institucional continue ativo, seu acesso ao B.A.D.E.S.P foi encerrado porque sua matrícula não está mais ativa.
        </p>

        <a href="{{ url_for('rotalogin.cadastro') }}">Voltar</a>
    </div>

</body>
</html>
