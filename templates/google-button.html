<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login com Google - Botão Personalizado</title>
    <script src="https://apis.google.com/js/platform.js" async defer></script>
    <style>
        .custom-google-btn img { 
            width: 30px; 
            height: 30px; 
        } 
        
        .custom-google-btn { 
            border: 2px solid rgba(255, 255, 255, 0.3); 
            border-radius: 15px; 
            padding: 5px; 
            display: flex; 
            flex-direction: row; 
            justify-content: center; 
            align-items: center; 
            background-color: rgb(255, 255, 255); 
            width: 150px; 
            backdrop-filter: blur(15px); 
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2); 
            z-index: 1;
        }

        .custom-google-btn:hover {
            background-color: #357AE8;
        }
    </style>
</head>
<body>

    <button class="custom-google-btn" onclick="googleSignIn()">
        <img src="Logo-Google-G.png" alt="Google Logo">
        oogle
    </button>

    <script>
        function googleSignIn() {
            gapi.auth2.getAuthInstance().signIn().then(function(googleUser) {
                var profile = googleUser.getBasicProfile();
                console.log("ID: " + profile.getId());
                console.log("Nome: " + profile.getName());
                console.log("Email: " + profile.getEmail());
            });
        }

        function initGoogleSignIn() {
            gapi.load('auth2', function() {
                gapi.auth2.init({
                    client_id: 'SUA_CLIENT_ID_AQUI.apps.googleusercontent.com'
                });
            });
        }

        window.onload = initGoogleSignIn;
    </script>
</body>
</html>
