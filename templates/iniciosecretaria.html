<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='iniciosecretaria.css') }}">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='icone.png') }}">

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=pin" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <title>B.A.D.E.S.P - Inicio</title>
</head>

<body>

    <header class="cabecalho glass">
        <button class="menu-btn"><span class="material-icons">menu</span></button>
        <h1 class="titulo">B.A.D.E.S.P</h1>
        <div class="perfil">
          <img src="{{ usuario[3] }}" alt="Logado como: {{ usuario[1] }}">
        </div>
      </header>

      <nav class="sidebar glass sobreposto">
        <ul>
          <li><a href="/Inicio"><span class="material-icons">home</span> Início</a></li>
          <li><a href="/Ajuda"><span class="material-icons">help_outline</span> Ajuda</a></li>
          <li><a href="/MudarPIN"><span class="material-icons">pin</span> Mudar o PIN</a></li>
    
          <!-- DESLOGAR VERMELHO -->
          <li><a href="/Logout" class="logout" onclick="confirmarLogout()"><span class="material-icons">logout</span> Deslogar</a></li>
        </ul>
      </nav>
      
    <br>
    <br>
    <br> 
   <div class="main-content">
        <div class="dashboard-container">
            <a href="/Abertas" class="card card-5">
                <p class="card-large-text">Denúncias </p>
                <p class="card-small-text">Abertas</p>


            </a>
            <a href="/Denuncias" class="card card-6">
                <p class="card-large-text">Novas </p>
                <p class="card-small-text">Denúncias</p>

            </a>
            <a href="/Alunos" class="card card-7">
                <p class="card-large-text">Alunos</p>
                <p class="card-small-text">Cadastrados</p>
            </a>

            <a href="/Resolvidas" class="card card-8">
                <p class="card-large-text">Denúncias </p>                
                <p class="card-small-text">Resolvidas</p>
            </a>
        </div>
    </div>

    <script>
        const btn = document.querySelector('.menu-btn');
        const sidebar = document.querySelector('.sidebar');
    
        btn.addEventListener('click', () => sidebar.classList.toggle('ativo'));
    
        function confirmarLogout() {
          if (confirm("Deseja realmente sair?")) {
            alert("Logout realizado com sucesso!");
          }
        }
    
        // ===== FECHAR MENU CLICANDO FORA + REDIRECIONAR P/ INÍCIO =====
        document.addEventListener("click", (e) => {
          const clicouFora = !sidebar.contains(e.target) && !btn.contains(e.target);
    
          if (sidebar.classList.contains("ativo") && clicouFora) {
            sidebar.classList.remove("ativo");
          }
        });
      </script>

</body>
</html>
